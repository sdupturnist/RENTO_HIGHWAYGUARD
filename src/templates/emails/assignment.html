<div style="font-family: Inter, Arial, sans-serif; color: #0f172a; background: #f8fafc; padding: 24px;">
  <div style="max-width: 640px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 18px 45px -24px rgba(15,23,42,0.25);">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <div style="width:42px; height:42px; border-radius:12px; background:#4f46e5; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:16px;">
        {{APP_INITIALS}}
      </div>
      <div style="font-size:18px; font-weight:700; color:#0f172a;">{{APP_NAME}}</div>
    </div>
    <h2 style="margin:0 0 8px 0; font-size:22px; color:#0f172a;">New Assignment: {{ASSIGNMENT_CODE}}</h2>
    <p style="margin:0 0 12px 0; color:#475569;">Customer: <strong>{{CUSTOMER}}</strong></p>
    <p style="margin:0 0 12px 0; color:#475569;">Project: <strong>{{PROJECT}}</strong></p>
    <p style="margin:0 0 12px 0; color:#475569;">Schedule: {{START_DATE}} → {{END_DATE}}</p>
    <div style="margin:16px 0; padding:12px; border-radius:12px; background:#eef2ff; color:#312e81;">
      <div style="font-weight:700; margin-bottom:6px;">Vehicles / Operators</div>
      {{BLOCKS_HTML}}
    </div>
    <p style="margin:12px 0 0 0; color:#94a3b8; font-size:12px;">Please do not reply to this automated message.</p>
  </div>
</div>
